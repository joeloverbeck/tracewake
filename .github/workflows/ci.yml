name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # The toolchain (channel + rustfmt/clippy components) is pinned by
  # rust-toolchain.toml; rustup installs it automatically on the first cargo call.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-clippy-
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-
      - name: Build workspace
        run: cargo build --workspace --all-targets --locked
      - name: TUI playable-capability parity
        run: cargo test -p tracewake-tui --test playable_capability_parity --locked
      - name: Run tests
        run: cargo test --workspace --locked

  lock-layer-gates:
    name: lock-layer gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lock-layer-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lock-layer-
      - name: Run strengthened lock-layer gates
        run: |
          cargo test --locked -p tracewake-core --test negative_fixture_runner
          cargo test --locked -p tracewake-core --test doc_invariant_references
          cargo test --locked -p tracewake-core --test spine_conformance
          cargo test --locked -p tracewake-core --test acceptance_gates
          cargo test --locked -p tracewake-core --test anti_regression_guards
          cargo test --locked -p tracewake-core --test event_schema_replay_gates
          cargo test --locked -p tracewake-core --test hidden_truth_gates
          cargo test --locked -p tracewake-core --test generative_lock generated_cases_enter_through_loaded_runtime_constructor
          cargo test --locked -p tracewake-content load::tests::loaded_fixture_hands_off_derived_runtime_due_work
          cargo test --locked -p tracewake-core --test acceptance_artifact_wording
          cargo test --locked -p tracewake-content --test schema_conformance
          cargo test --locked -p tracewake-content --test forbidden_content
          cargo test --locked -p tracewake-tui --test adversarial_gates
          cargo test --locked -p tracewake-tui --test tui_seam_conformance
      - name: Ingest changed acceptance artifacts
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            acceptance_range="origin/${{ github.base_ref }}...HEAD"
          else
            acceptance_range="HEAD^..HEAD"
          fi
          changed_artifacts="$(git diff --name-only "$acceptance_range" | grep -E '^(reports|archive/reports)/.*(acceptance|ACCEPTANCE).*\.md$' || true)"
          changed_closure_paths="$(git diff --name-only "$acceptance_range" | grep -E '^(reports|archive/reports|specs|archive/specs)/' || true)"
          if [ -z "$changed_artifacts" ]; then
            if [ -n "$changed_closure_paths" ]; then
              echo "Current acceptance artifact required for report/spec closure changes."
              echo "$changed_closure_paths"
              exit 1
            fi
            echo "No changed acceptance artifact to ingest."
            exit 0
          fi
          for artifact in $changed_artifacts; do
            if ! grep -q '```tracewake-acceptance-status' "$artifact"; then
              echo "$artifact lacks tracewake-acceptance-status block."
              exit 1
            fi
            TRACEWAKE_ACCEPTANCE_ARTIFACT="$artifact" \
              cargo test --locked -p tracewake-core --test acceptance_status_manifest actual_acceptance_artifact_from_ci_env_is_pass_eligible
          done

  public-boundary-conformance:
    name: public-boundary conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-public-boundary-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-public-boundary-
      - name: Run public-boundary conformance matrix
        run: |
          cargo test --locked -p tracewake-core --test negative_fixture_runner
          cargo test --locked -p tracewake-core --test generative_lock
          cargo test --locked -p tracewake-core --test world_step_coordinator
          cargo test --locked -p tracewake-tui --test command_loop_session
          cargo test --locked -p tracewake-tui --test playable_capability_parity
          cargo test --locked -p tracewake-tui --test embodied_flow

  governance-required-checks-audit:
    name: governance required checks audit
    runs-on: ubuntu-latest
    steps:
      - name: Audit main branch required checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          protection_json="$(gh api "repos/${GITHUB_REPOSITORY}/branches/main/protection" 2>protection.err)"
          protection_status=$?
          ruleset_ids="$(gh api "repos/${GITHUB_REPOSITORY}/rulesets?targets=branch" --jq '.[].id' 2>rulesets.err)"
          rulesets_status=$?
          # The rulesets list endpoint returns summaries only (no rules or
          # bypass_actors); fetch each ruleset's full definition so required-check
          # governance and bypass residuals can be proven from the rules array.
          rulesets_json=""
          if [ "$rulesets_status" -eq 0 ]; then
            for ruleset_id in $ruleset_ids; do
              ruleset_detail="$(gh api "repos/${GITHUB_REPOSITORY}/rulesets/${ruleset_id}" 2>>rulesets.err)"
              ruleset_detail_status=$?
              if [ "$ruleset_detail_status" -ne 0 ]; then
                rulesets_status="$ruleset_detail_status"
                continue
              fi
              rulesets_json="${rulesets_json}${ruleset_detail}"
            done
          fi
          set -e

          if [ "$protection_status" -ne 0 ] && [ "$rulesets_status" -ne 0 ]; then
            echo "pending/unverified: branch-protection and ruleset APIs were unavailable."
            sed 's/^/branch-protection api: /' protection.err
            sed 's/^/rulesets api: /' rulesets.err
            exit 1
          fi

          PROTECTION_JSON="$protection_json" \
          PROTECTION_STATUS="$protection_status" \
          RULESETS_JSON="$rulesets_json" \
          RULESETS_STATUS="$rulesets_status" \
          python3 - <<'PY'
          import json
          import os
          import sys

          required_checks = {
              "rustfmt",
              "clippy",
              "build & test",
              "lock-layer gates",
              "public-boundary conformance",
              "full-surface mutation trigger (lock layer)",
              "mutation shard reconciliation (lock layer)",
          }

          contexts = set()
          pr_required = False
          up_to_date_or_merge_queue = False
          bypass_residuals = []
          evidence = []

          if os.environ["PROTECTION_STATUS"] == "0":
              protection = json.loads(os.environ["PROTECTION_JSON"] or "{}")
              checks = protection.get("required_status_checks") or {}
              contexts.update(checks.get("contexts") or [])
              contexts.update(
                  check.get("context")
                  for check in checks.get("checks") or []
                  if check.get("context")
              )
              up_to_date_or_merge_queue = up_to_date_or_merge_queue or bool(checks.get("strict"))
              pr_required = pr_required or bool(protection.get("required_pull_request_reviews"))
              enforce_admins = protection.get("enforce_admins") or {}
              if not enforce_admins.get("enabled"):
                  bypass_residuals.append("branch protection does not enforce admins")
              evidence.append("branches/main/protection")

          if os.environ["RULESETS_STATUS"] == "0":
              decoder = json.JSONDecoder()
              text = (os.environ["RULESETS_JSON"] or "").strip()
              rulesets = []
              index = 0
              while index < len(text):
                  ruleset, end = decoder.raw_decode(text, index)
                  rulesets.append(ruleset)
                  index = end
                  while index < len(text) and text[index].isspace():
                      index += 1
              for ruleset in rulesets:
                  if ruleset.get("target") != "branch":
                      continue
                  if ruleset.get("enforcement") != "active":
                      continue
                  if ruleset.get("bypass_actors"):
                      bypass_residuals.append(
                          f"ruleset {ruleset.get('name', '<unnamed>')} has bypass actors"
                      )
                  evidence.append(f"rulesets:{ruleset.get('name', '<unnamed>')}")
                  for rule in ruleset.get("rules") or []:
                      rule_type = rule.get("type")
                      parameters = rule.get("parameters") or {}
                      if rule_type == "pull_request":
                          pr_required = True
                      if rule_type == "required_status_checks":
                          for check in parameters.get("required_status_checks") or []:
                              context = check.get("context")
                              if context:
                                  contexts.add(context)
                          up_to_date_or_merge_queue = up_to_date_or_merge_queue or bool(
                              parameters.get("strict_required_status_checks_policy")
                          )
                      if rule_type == "merge_queue":
                          up_to_date_or_merge_queue = True

          missing = sorted(required_checks - contexts)
          failures = []
          if missing:
              failures.append(f"missing required status checks: {missing}")
          if not pr_required:
              failures.append("pull request requirement not proven")
          if not up_to_date_or_merge_queue:
              failures.append("up-to-date branch or merge queue requirement not proven")
          failures.extend(bypass_residuals)

          print("Governance API evidence:", ", ".join(evidence) or "none")
          print("Required check contexts discovered:", sorted(contexts))
          if failures:
              print("pending/unverified: required-check governance is not proven.")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          print("Governance required checks audit passed.")
          PY

  full-surface-mutation-trigger:
    name: full-surface mutation trigger (lock layer)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check full-surface mutation trigger breadth
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            full_surface_range="origin/${{ github.base_ref }}...HEAD"
          else
            full_surface_range="HEAD^..HEAD"
          fi
          if git diff --name-only "$full_surface_range" | grep -E '^(\.cargo/mutants\.toml|\.cargo/mutants-baseline-misses\.txt|\.github/workflows/ci\.yml|tools/(merge-mutation-shards\.py|supervise-command\.sh)|tests/negative-fixtures/|crates/tracewake-core/(src|tests)/|crates/tracewake-content/(src|tests)/|crates/tracewake-tui/(src|tests)/|reports/0052_|archive/tickets/0052FOUCONFOU-|specs/0052_)' >/dev/null; then
            echo "Full-surface mutation reconciliation is required for this change before merge."
            echo "Required checks: public-boundary conformance and mutation shard reconciliation (lock layer)."
            echo "A red scheduled mutation result is merge-blocking until repaired; pending is not a pass."
          else
            echo "No full-surface mutation trigger path changed."
          fi

  mutants-in-diff:
    name: mutation in-diff (lock layer)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check guarded-layer diff
        id: guarded_diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            guarded_range="origin/${{ github.base_ref }}...HEAD"
          else
            guarded_range="HEAD^..HEAD"
          fi
          if git diff --name-only "$guarded_range" | grep -E '^(crates/tracewake-core/src/agent/|crates/tracewake-core/src/runtime/|crates/tracewake-core/src/need_accounting\.rs|crates/tracewake-core/src/scheduler\.rs|crates/tracewake-core/src/time\.rs|crates/tracewake-core/src/projections\.rs|crates/tracewake-core/src/actions/pipeline\.rs|crates/tracewake-core/src/actions/registry\.rs|crates/tracewake-core/src/actions/defs/(need_events|eat|sleep|work|wait|continue_routine|movement|checkcontainer)\.rs|crates/tracewake-core/src/events/|crates/tracewake-core/src/replay/|crates/tracewake-core/src/checksum\.rs|crates/tracewake-core/src/state\.rs|crates/tracewake-core/src/actions/(proposal|report)\.rs|crates/tracewake-core/src/view_models\.rs|crates/tracewake-core/src/debug_capability\.rs|crates/tracewake-core/src/controller\.rs|crates/tracewake-core/src/debug_reports\.rs|crates/tracewake-core/src/epistemics/|crates/tracewake-content/src/(manifest|load|schema|serialization|validate)\.rs|crates/tracewake-tui/src/(app|debug_panels|render|transcript)\.rs)' >/dev/null; then
            echo "run_mutants=true" >> "$GITHUB_OUTPUT"
            echo "guarded_range=$guarded_range" >> "$GITHUB_OUTPUT"
          else
            echo "run_mutants=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Cache cargo
        if: steps.guarded_diff.outputs.run_mutants == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mutants-in-diff-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mutants-in-diff-
      - name: Install cargo-mutants
        if: steps.guarded_diff.outputs.run_mutants == 'true'
        run: cargo install cargo-mutants --version 27.1.0 --locked
      - name: Run guarded-layer mutants in diff
        if: steps.guarded_diff.outputs.run_mutants == 'true'
        run: |
          git diff "${{ steps.guarded_diff.outputs.guarded_range }}" > "$RUNNER_TEMP/guarded.diff"
          # cargo-mutants exits 2 on any miss; apply the same ratchet as the
          # scheduled job, but match on file+mutation+function (drop line:col)
          # so accepted baseline misses aren't re-flagged when lines shift.
          set +e
          # Pin an explicit per-mutant test timeout (matching the scheduled
          # shard job's 183s) instead of cargo-mutants' fragile auto-set window
          # (~20s for this workspace), which spuriously times out the growing
          # workspace test suite and makes cargo-mutants exit 3 (TIMEOUT).
          # Run two mutants concurrently (matching the scheduled shard job's
          # MUTANTS_JOBS) so a large guarded diff does not serialize into a
          # ~20-minute wall; --no-shuffle keeps the run deterministic.
          cargo mutants --in-diff "$RUNNER_TEMP/guarded.diff" --no-shuffle --jobs 2 --timeout 183
          mutants_status=$?
          set -e
          if [ "$mutants_status" -ne 0 ] && [ "$mutants_status" -ne 2 ] && [ "$mutants_status" -ne 3 ]; then
            echo "cargo-mutants failed with status $mutants_status; this is a tool/run failure, not a passing mutation gate."
            find mutants.out -maxdepth 2 -type f -print || true
            exit "$mutants_status"
          fi
          # A guarded file can change with no mutable production lines in the
          # diff (test-only or comment-only edits — cargo-mutants logs "No
          # mutants to filter", exits 0, and writes no output). That is a
          # legitimate pass, not a tool failure: there is no production logic to
          # cover. Only the genuine anomaly (a miss-bearing status with no
          # artifacts) should fall through to the failure guard below.
          if [ "$mutants_status" -eq 0 ] && { [ ! -d mutants.out ] || ! find mutants.out -type f -print -quit | grep -q .; }; then
            echo "No mutable production lines in the guarded diff (e.g. test-only or comment-only changes); nothing to mutate. Gate passes."
            exit 0
          fi
          if [ ! -d mutants.out ] || ! find mutants.out -type f -print -quit | grep -q .; then
            echo "cargo-mutants produced no output artifacts for a guarded diff."
            exit 1
          fi
          survivor_files=()
          if [ -f mutants.out/missed.txt ]; then
            survivor_files+=(mutants.out/missed.txt)
          fi
          if [ -f mutants.out/timeout.txt ]; then
            survivor_files+=(mutants.out/timeout.txt)
          fi
          if [ "${#survivor_files[@]}" -eq 0 ]; then
            if [ "$mutants_status" -eq 0 ]; then
              echo "No missed.txt or timeout.txt produced and cargo-mutants exited 0; all in-diff mutants were caught."
              exit 0
            fi
            echo "cargo-mutants exited $mutants_status but produced no survivor artifacts (missed.txt or timeout.txt)."
            find mutants.out -maxdepth 2 -type f -print || true
            exit 1
          fi
          strip() { sed -E 's/:[0-9]+:[0-9]+:/:/' "$@" | sort -u; }
          new_survivors="$(comm -23 <(strip "${survivor_files[@]}") <(strip .cargo/mutants-baseline-misses.txt))"
          if [ -n "$new_survivors" ]; then
            echo "New missed or timed-out mutants on changed guarded-layer lines (not in accepted baseline):"
            echo "$new_survivors"
            exit 1
          fi
          if [ "$mutants_status" -eq 3 ]; then
            echo "All in-diff timeouts are accepted baseline entries; gate passes."
            exit 0
          fi
          echo "All in-diff misses/timeouts are accepted baseline entries; gate passes."

  mutants-lock-layer-baseline:
    name: mutation baseline and census (lock layer)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mutants-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mutants-
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --version 27.1.0 --locked
      - name: Run unmutated baseline and canonical census
        run: |
          mkdir -p mutation-input
          {
            echo "commit=$(git rev-parse HEAD)"
            echo "config_fingerprint=$(sha256sum .cargo/mutants.toml | cut -d ' ' -f1)"
            echo "toolchain_fingerprint=$(sha256sum rust-toolchain.toml Cargo.lock Cargo.toml | sha256sum | cut -d ' ' -f1)"
          } > mutation-input/fingerprints.env
          cargo test --workspace --locked
          cargo mutants --workspace --no-shuffle --list-files > mutation-input/canonical-list-files.txt
          cargo mutants --workspace --no-shuffle --list > mutation-input/canonical-list.txt
      - name: Upload mutation baseline input
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cargo-mutants-lock-layer-baseline
          path: mutation-input

  mutants-lock-layer:
    name: mutation shard ${{ matrix.shard }}/8 (lock layer)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: mutants-lock-layer-baseline
    timeout-minutes: 130
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    env:
      MUTANTS_JOBS: "2"
      MUTANTS_SHARDS: "8"
      MUTANTS_WALL_SECONDS: "7200"
      MUTANTS_GRACE_SECONDS: "120"
      MUTANTS_TEST_TIMEOUT: "183"
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mutants-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mutants-
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --version 27.1.0 --locked
      - name: Run supervised mutation shard
        run: |
          shard_id="${{ matrix.shard }}"
          # Recurring-lane scratch namespace: gitignored and never committed, so a
          # fresh checkout never repopulates it. This lane used to reuse the
          # committed 0045 proof-cert transcript paths, which the checkout restored;
          # the supervisor then diverted this run's authoritative status.env to a
          # sibling ".attempt-N" dir outside the uploaded/reconciled path, letting
          # reconciliation read the stale committed status. The committed cert now
          # stays untouched and this run writes fresh evidence here. The "rm -rf"
          # keeps the step idempotent on a reused runner: the supervisor diverts on
          # ANY non-empty target, so clear residue and write to the canonical path.
          shard_dir="mutation-lane/mutation_shard_${shard_id}_of_${MUTANTS_SHARDS}"
          out_dir="mutation-lane/mutation_shard_${shard_id}_of_${MUTANTS_SHARDS}.out"
          commit="$(git rev-parse HEAD)"
          config_fingerprint="$(sha256sum .cargo/mutants.toml | cut -d ' ' -f1)"
          toolchain_fingerprint="$(sha256sum rust-toolchain.toml Cargo.lock Cargo.toml | sha256sum | cut -d ' ' -f1)"
          rm -rf "$shard_dir" "$out_dir"
          set +e
          tools/supervise-command.sh "$shard_dir" "$MUTANTS_WALL_SECONDS" "$MUTANTS_GRACE_SECONDS" -- \
            cargo mutants --workspace --no-shuffle \
              --shard "${shard_id}/${MUTANTS_SHARDS}" \
              --jobs "$MUTANTS_JOBS" \
              --baseline=skip \
              --timeout "$MUTANTS_TEST_TIMEOUT" \
              -o "$out_dir"
          supervisor_status=$?
          set -e
          {
            echo "shard_index=$shard_id"
            echo "shard_total=$MUTANTS_SHARDS"
            echo "commit=$commit"
            echo "config_fingerprint=$config_fingerprint"
            echo "toolchain_fingerprint=$toolchain_fingerprint"
          } > "$shard_dir/shard.env"
          if [ -f "$out_dir/mutants.out/mutants.json" ]; then
            cp "$out_dir/mutants.out/mutants.json" "$shard_dir/assigned-mutants.json"
          fi
          if [ -d "$out_dir/mutants.out" ]; then
            cp -R "$out_dir/mutants.out" "$shard_dir/mutants.out"
          fi
          exit "$supervisor_status"
      - name: Upload mutation shard output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cargo-mutants-lock-layer-shard-${{ matrix.shard }}-of-8
          path: |
            mutation-lane/mutation_shard_${{ matrix.shard }}_of_8
            mutation-lane/mutation_shard_${{ matrix.shard }}_of_8.out

  mutants-lock-layer-reconcile:
    name: mutation shard reconciliation (lock layer)
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    needs:
      - mutants-lock-layer-baseline
      - mutants-lock-layer
    steps:
      - uses: actions/checkout@v5
      - name: Download mutation artifacts
        uses: actions/download-artifact@v7
        with:
          path: mutation-artifacts
          pattern: cargo-mutants-lock-layer-*
      - name: Reconcile shard union
        run: |
          mkdir -p mutation-lane
          baseline_dir="$(find mutation-artifacts/cargo-mutants-lock-layer-baseline -type f -name fingerprints.env -printf '%h\n' | sort | head -n 1)"
          if [ -z "$baseline_dir" ]; then
            echo "Missing mutation baseline artifact input."
            find mutation-artifacts -maxdepth 3 -type f -print || true
            exit 1
          fi
          source "$baseline_dir/fingerprints.env"
          mapfile -t shard_dirs < <(find mutation-artifacts -type f -path '*/status.env' -printf '%h\n' | sort)
          if [ "${#shard_dirs[@]}" -ne 8 ]; then
            echo "Expected 8 shard status directories, found ${#shard_dirs[@]}"
            printf '%s\n' "${shard_dirs[@]}"
            exit 1
          fi
          args=()
          for shard_dir in "${shard_dirs[@]}"; do
            args+=(--shard "$shard_dir")
          done
          python3 tools/merge-mutation-shards.py \
            --canonical-list "$baseline_dir/canonical-list.txt" \
            --expected-shards 8 \
            --commit "$commit" \
            --config-fingerprint "$config_fingerprint" \
            --toolchain-fingerprint "$toolchain_fingerprint" \
            --out-md mutation-lane/mutation_completion_manifest.md \
            --out-json mutation-lane/mutation_completion_manifest.json \
            "${args[@]}"
      - name: Upload mutation reconciliation output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cargo-mutants-lock-layer-reconciliation
          path: |
            mutation-lane/mutation_completion_manifest.md
            mutation-lane/mutation_completion_manifest.json
