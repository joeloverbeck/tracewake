name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # The toolchain (channel + rustfmt/clippy components) is pinned by
  # rust-toolchain.toml; rustup installs it automatically on the first cargo call.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-clippy-
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-
      - name: Build workspace
        run: cargo build --workspace --all-targets --locked
      - name: Run tests
        run: cargo test --workspace --locked

  lock-layer-gates:
    name: lock-layer gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lock-layer-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lock-layer-
      - name: Run strengthened lock-layer gates
        run: |
          cargo test --locked -p tracewake-core --test negative_fixture_runner
          cargo test --locked -p tracewake-core --test doc_invariant_references
          cargo test --locked -p tracewake-core --test spine_conformance
          cargo test --locked -p tracewake-core --test acceptance_gates
          cargo test --locked -p tracewake-core --test anti_regression_guards
          cargo test --locked -p tracewake-core --test event_schema_replay_gates
          cargo test --locked -p tracewake-core --test hidden_truth_gates
          cargo test --locked -p tracewake-core --test acceptance_artifact_wording
          cargo test --locked -p tracewake-content --test schema_conformance
          cargo test --locked -p tracewake-content --test forbidden_content
          cargo test --locked -p tracewake-tui --test adversarial_gates
          cargo test --locked -p tracewake-tui --test tui_seam_conformance

  mutants-in-diff:
    name: mutation in-diff (lock layer)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check guarded-layer diff
        id: guarded_diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            guarded_range="origin/${{ github.base_ref }}...HEAD"
          else
            guarded_range="HEAD^..HEAD"
          fi
          if git diff --name-only "$guarded_range" | grep -E '^(crates/tracewake-core/src/agent/|crates/tracewake-core/src/scheduler\.rs|crates/tracewake-core/src/projections\.rs|crates/tracewake-core/src/actions/pipeline\.rs|crates/tracewake-core/src/actions/defs/(eat|sleep|work)\.rs)' >/dev/null; then
            echo "run_mutants=true" >> "$GITHUB_OUTPUT"
            echo "guarded_range=$guarded_range" >> "$GITHUB_OUTPUT"
          else
            echo "run_mutants=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Cache cargo
        if: steps.guarded_diff.outputs.run_mutants == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mutants-in-diff-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mutants-in-diff-
      - name: Install cargo-mutants
        if: steps.guarded_diff.outputs.run_mutants == 'true'
        run: cargo install cargo-mutants --version 27.1.0 --locked
      - name: Run guarded-layer mutants in diff
        if: steps.guarded_diff.outputs.run_mutants == 'true'
        run: |
          git diff "${{ steps.guarded_diff.outputs.guarded_range }}" > "$RUNNER_TEMP/guarded.diff"
          # cargo-mutants exits 2 on any miss; apply the same ratchet as the
          # scheduled job, but match on file+mutation+function (drop line:col)
          # so accepted baseline misses aren't re-flagged when lines shift.
          set +e
          cargo mutants --in-diff "$RUNNER_TEMP/guarded.diff" --no-shuffle
          mutants_status=$?
          set -e
          if [ "$mutants_status" -ne 0 ] && [ "$mutants_status" -ne 2 ]; then
            echo "cargo-mutants failed with status $mutants_status; this is a tool/run failure, not a passing mutation gate."
            find mutants.out -maxdepth 2 -type f -print || true
            exit "$mutants_status"
          fi
          if [ ! -d mutants.out ] || ! find mutants.out -type f -print -quit | grep -q .; then
            echo "cargo-mutants produced no output artifacts for a guarded diff."
            exit 1
          fi
          if [ ! -f mutants.out/missed.txt ]; then
            echo "No missed.txt produced and cargo-mutants exited 0; all in-diff mutants were caught."
            exit 0
          fi
          strip() { sed -E 's/:[0-9]+:[0-9]+:/:/' "$1" | sort -u; }
          new_misses="$(comm -23 <(strip mutants.out/missed.txt) <(strip .cargo/mutants-baseline-misses.txt))"
          if [ -n "$new_misses" ]; then
            echo "New missed mutants on changed guarded-layer lines (not in accepted baseline):"
            echo "$new_misses"
            exit 1
          fi
          echo "All in-diff misses are accepted baseline entries; gate passes."

  mutants-lock-layer:
    name: mutation baseline (lock layer)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mutants-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mutants-
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --version 27.1.0 --locked
      - name: Run guarded-layer mutation baseline
        id: scheduled_mutants
        run: |
          set +e
          cargo mutants --workspace \
            -f 'crates/tracewake-core/src/agent/**' \
            -f 'crates/tracewake-core/src/scheduler*' \
            -f 'crates/tracewake-core/src/projections*' \
            -f 'crates/tracewake-core/src/actions/pipeline.rs' \
            -f 'crates/tracewake-core/src/actions/defs/eat.rs' \
            -f 'crates/tracewake-core/src/actions/defs/sleep.rs' \
            -f 'crates/tracewake-core/src/actions/defs/work.rs' \
            --no-shuffle
          mutants_status=$?
          set -e
          echo "mutants_status=$mutants_status" >> "$GITHUB_OUTPUT"
          if [ "$mutants_status" -ne 0 ] && [ "$mutants_status" -ne 2 ]; then
            echo "cargo-mutants failed with status $mutants_status; this is a tool/run failure, not a passing mutation gate."
            find mutants.out -maxdepth 2 -type f -print || true
            exit "$mutants_status"
          fi
      - name: Check missed-mutant baseline
        if: always() && steps.scheduled_mutants.outcome != 'skipped'
        run: |
          if [ "${{ steps.scheduled_mutants.outputs.mutants_status }}" = "0" ] && [ ! -f mutants.out/missed.txt ]; then
            echo "cargo-mutants exited 0 and produced no missed mutants; scheduled mutation baseline is clean."
            exit 0
          fi
          if [ ! -f mutants.out/missed.txt ]; then
            echo "cargo-mutants did not produce mutants.out/missed.txt; inspect artifact before updating the baseline."
            find mutants.out -maxdepth 2 -type f -print || true
            exit 1
          fi
          strip() { sed -E 's/:[0-9]+:[0-9]+:/:/' "$1" | sort -u; }
          strip .cargo/mutants-baseline-misses.txt > "$RUNNER_TEMP/mutants-baseline.normalized.txt"
          strip mutants.out/missed.txt > "$RUNNER_TEMP/mutants-missed.normalized.txt"
          comm -23 "$RUNNER_TEMP/mutants-missed.normalized.txt" "$RUNNER_TEMP/mutants-baseline.normalized.txt" > "$RUNNER_TEMP/mutants-new-misses.txt"
          if [ -s "$RUNNER_TEMP/mutants-new-misses.txt" ]; then
            echo "New missed mutants outside accepted baseline:"
            cat "$RUNNER_TEMP/mutants-new-misses.txt"
            {
              echo "### New missed mutants outside accepted baseline"
              echo
              echo '```'
              cat "$RUNNER_TEMP/mutants-new-misses.txt"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          {
            echo "### Mutation baseline ratchet"
            echo
            echo "No new missed mutants outside the accepted normalized baseline."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload mutation baseline output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-mutants-lock-layer
          path: mutants.out
