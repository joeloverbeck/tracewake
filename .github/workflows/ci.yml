name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # The toolchain (channel + rustfmt/clippy components) is pinned by
  # rust-toolchain.toml; rustup installs it automatically on the first cargo call.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-clippy-
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-
      - name: Build workspace
        run: cargo build --workspace --all-targets --locked
      - name: Run tests
        run: cargo test --workspace --locked

  lock-layer-gates:
    name: lock-layer gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lock-layer-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lock-layer-
      - name: Run strengthened lock-layer gates
        run: |
          cargo test --locked -p tracewake-core --test negative_fixture_runner
          cargo test --locked -p tracewake-core --test doc_invariant_references
          cargo test --locked -p tracewake-core --test spine_conformance
          cargo test --locked -p tracewake-core --test acceptance_gates
          cargo test --locked -p tracewake-core --test anti_regression_guards
          cargo test --locked -p tracewake-core --test event_schema_replay_gates
          cargo test --locked -p tracewake-core --test hidden_truth_gates
          cargo test --locked -p tracewake-core --test acceptance_artifact_wording
          cargo test --locked -p tracewake-content --test schema_conformance
          cargo test --locked -p tracewake-content --test forbidden_content
          cargo test --locked -p tracewake-tui --test adversarial_gates
          cargo test --locked -p tracewake-tui --test tui_seam_conformance

  mutants-lock-layer:
    name: mutation baseline (lock layer)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mutants-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mutants-
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run guarded-layer mutation baseline
        run: |
          cargo mutants --workspace \
            -f 'crates/tracewake-core/src/agent/**' \
            -f 'crates/tracewake-core/src/scheduler*' \
            -f 'crates/tracewake-core/src/projections*' \
            -f 'crates/tracewake-core/src/actions/pipeline.rs' \
            --no-shuffle
      - name: Upload mutation baseline output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-mutants-lock-layer
          path: mutants.out
